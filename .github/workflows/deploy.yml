name: Dev CI/CD with Coverage

on:
  push:
    branches: [ dev ]

env:
  TOMCAT_APP_DIR: ${{ secrets.TOMCAT_APP_DIR_TEST_ENV }}
  TOMCAT_ARCHIVE_DIR: ${{ secrets.TOMCAT_ARCHIVE_DIR_TEST_ENV }}

jobs:
  build-test-deploy:
    runs-on: [self-hosted, Linux, X64, test]

    env:
      SPRING_PROFILES_ACTIVE: test
      ANDROMEDA_TEST_DB_URL: ${{ secrets.ANDROMEDA_TEST_DB_URL }}
      ANDROMEDA_TEST_DB_USERNAME: ${{ secrets.ANDROMEDA_TEST_DB_USERNAME }}
      ANDROMEDA_TEST_DB_PASSWORD: ${{ secrets.ANDROMEDA_TEST_DB_PASSWORD }}
      APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
      APP_JWT_CONFIRMATION_EXPIRATION: ${{ secrets.APP_JWT_CONFIRMATION_EXPIRATION }}
      APP_JWT_ACCESS_EXPIRATION: ${{ secrets.APP_JWT_ACCESS_EXPIRATION }}
      APP_JWT_REFRESH_EXPIRATION: ${{ secrets.APP_JWT_REFRESH_EXPIRATION }}
      APP_JWT_SESSION_EXPIRATION: ${{ secrets.APP_JWT_SESSION_EXPIRATION }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      ALLOWED_APPS_HEADERS: ${{ secrets.ALLOWED_APPS_HEADERS }}
      NEBULA_CONFIRMATION_MAIL_URL: ${{ secrets.NEBULA_CONFIRMATION_MAIL_URL }}
      AUTH_MAIL_HOST: ${{ secrets.AUTH_MAIL_HOST }}
      AUTH_MAIL_PORT: ${{ secrets.AUTH_MAIL_PORT }}
      AUTH_MAIL_USERNAME: ${{ secrets.AUTH_MAIL_USERNAME }}
      AUTH_MAIL_PASSWORD: ${{ secrets.AUTH_MAIL_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Test
        run: ./mvnw -B clean verify -DtrimStackTrace=false

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: target/site/jacoco/

      - name: Deploy
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          APP_DIR="${TOMCAT_APP_DIR}"
          ARCHIVE_DIR="${TOMCAT_ARCHIVE_DIR}"

          sudo chown -R wolf:wolf "$(dirname "$APP_DIR")"
          mkdir -p "$APP_DIR" "$ARCHIVE_DIR"

          FULL_WAR_NAME=$(ls target/*.war | xargs basename)
          VERSION=$(echo "$FULL_WAR_NAME" | sed 's/andromeda-authorization-server-//;s/.war//')

          # 1) remove false dirs that looks like .war
          find "$APP_DIR" -maxdepth 1 -type d -name 'andromeda-authorization-server##*.war' -exec rm -rf {} +

          # 2) delete only .war (without dir conflicts)
          find "$APP_DIR" -maxdepth 1 -type f -name 'andromeda-authorization-server##*.war' -delete

          # 3) copy new artifacts
          cp target/*.war "$ARCHIVE_DIR/andromeda-authorization-server##$VERSION.war"
          cp target/*.war "$APP_DIR/andromeda-authorization-server##$VERSION.war"
          cp target/*.war "$APP_DIR/andromeda-authorization-server##latest.war"
          
          sudo chown -R wolf:wolf "$APP_DIR" "$ARCHIVE_DIR"
          docker restart tomcat-test-andromeda